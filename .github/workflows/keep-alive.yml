name: Keep Render Awake

# Render 무료 웹서비스는 15분 미사용 시 슬립.
# 수정 이력:
#   v1: */10 cron + RENDER_URL 시크릿 → 시크릿 미설정 시 조용히 스킵, 지연으로 25분 공백 발생
#   v2: URL 하드코딩 + */5 cron + 4분 간격 이중 핑 → 최악 지연에도 15분 이내 보장
#
# 작동 원리:
#   GitHub Actions cron */5 는 실제로 5~15분 지연될 수 있음.
#   각 워크플로 실행에서 핑 2회(0분, +4분)를 보내므로:
#     최악 케이스: GitHub 14분 지연 → 핑 간격 max = 14 - 4 = 10분 (< 15분 ✅)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: "Ping #1 — wake up if sleeping"
        run: |
          URL="https://scholarlink-api.onrender.com"
          echo "Pinging ${URL}/api/health ..."
          HTTP=$(curl -sf -o /dev/null -w "%{http_code}" \
            --max-time 90 --retry 2 --retry-delay 5 \
            "${URL}/api/health" 2>/dev/null || echo "000")
          echo "HTTP status: ${HTTP}"
          if [ "${HTTP}" = "200" ]; then
            echo "✅ Ping 1 OK"
          else
            echo "⚠️  Ping 1 returned ${HTTP} (Render may be waking up)"
          fi

      - name: "Wait 4 minutes before second ping"
        run: sleep 240

      - name: "Ping #2 — confirm still awake"
        run: |
          URL="https://scholarlink-api.onrender.com"
          HTTP=$(curl -sf -o /dev/null -w "%{http_code}" \
            --max-time 30 --retry 1 \
            "${URL}/api/health" 2>/dev/null || echo "000")
          echo "HTTP status: ${HTTP}"
          if [ "${HTTP}" = "200" ]; then
            echo "✅ Ping 2 OK"
          else
            echo "⚠️  Ping 2 returned ${HTTP}"
          fi
