name: Keep Render Awake

# Render 무료 웹서비스는 15분 미사용 시 슬립.
# 이 워크플로가 주기적으로 health 엔드포인트를 핑하여 슬립을 방지합니다.
#
# ⚠️ 설정 필요:
#   GitHub 레포 → Settings → Secrets and variables → Actions → New repository secret
#   이름: RENDER_URL    값: https://scholarlink-api.onrender.com  (실제 Render URL)

on:
  schedule:
    # GitHub Actions cron 최소 간격은 5분. 실제로는 5~15분 지연될 수 있음.
    - cron: "*/10 * * * *"
  workflow_dispatch:   # 수동 실행 버튼도 제공

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          URL="${{ secrets.RENDER_URL }}"
          if [ -z "$URL" ]; then
            echo "::warning::RENDER_URL secret is not set. Skipping ping."
            exit 0
          fi
          echo "Pinging $URL/api/health ..."
          # 슬립 상태면 깨어나는 데 30~50초 걸리므로 타임아웃 넉넉히
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$URL/api/health" || echo "000")
          echo "HTTP status: $code"
          if [ "$code" = "200" ]; then
            echo "✅ Service is awake"
          else
            echo "::warning::Unexpected status $code (service may be waking up)"
          fi
