# Render Blueprint — ScholarLink 백엔드 + PostgreSQL
# https://render.com/docs/blueprint-spec
#
# 사용법: Render 대시보드 → New → Blueprint → 이 레포 연결 → 자동 배포
# DATABASE_URL은 아래 database가 자동으로 주입합니다.

databases:
  - name: scholarlink-db
    databaseName: scholarlink
    user: scholarlink
    plan: free          # 무료 PostgreSQL (90일 후 만료 — 갱신 필요)
    region: singapore   # 한국에서 가장 가까운 무료 리전

services:
  - type: web
    name: scholarlink-api
    runtime: node
    plan: free          # 무료 웹서비스 (15분 미사용 시 슬립 → cron으로 방지)
    region: singapore
    rootDir: server
    buildCommand: npm install && npm run build && npm run db:migrate:prod
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      # DB는 위 database에서 자동 연결
      - key: DATABASE_URL
        fromDatabase:
          name: scholarlink-db
          property: connectionString

      # 자동 생성되는 보안 값 (Render가 랜덤 생성)
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true   # 32-byte hex 자동 생성

      # 고정 설정
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: MAX_FILE_SIZE_MB
        value: "50"

      # ── 아래는 Render 대시보드에서 직접 입력해야 하는 값 ──
      # (sync: false = Blueprint가 덮어쓰지 않음, 수동 입력)
      - key: APP_URL
        sync: false           # 예: https://wheeljah.github.io/SC_link
      - key: SERVER_URL
        sync: false           # 예: https://scholarlink-api.onrender.com
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false           # Gmail 주소
      - key: SMTP_PASS
        sync: false           # Gmail 앱 비밀번호
      - key: SMTP_FROM
        sync: false           # sales@ai-traffic.kr
      - key: UNPAYWALL_EMAIL
        sync: false           # sales@ai-traffic.kr
