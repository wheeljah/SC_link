# Render Blueprint — ScholarLink 백엔드
# https://render.com/docs/blueprint-spec
#
# 사용법: Render 대시보드 → New → Blueprint → 이 레포 연결 → 자동 배포
#
# DB는 Render 내장(90일 만료) 대신 Neon 무료 PostgreSQL(만료 없음)을 사용합니다.
# → DATABASE_URL에 Neon 연결문자열을 직접 입력합니다 (가이드 STEP 참고).

services:
  - type: web
    name: scholarlink-api
    runtime: node
    plan: free          # 무료 웹서비스 (15분 미사용 시 슬립 → cron으로 방지)
    region: singapore   # 한국에서 가장 가까운 무료 리전
    rootDir: server
    # devDependencies까지 설치(타입 정의 필요) → 빌드 → 마이그레이션은 start에서
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    envVars:
      # 빌드 시 devDependencies(@types/*) 설치 보장
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      # puppeteer Chromium 다운로드 스킵 (무료 512MB에서 불필요·용량과다)
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: "true"

      # DB: Neon 연결문자열 직접 입력 (sync:false = 대시보드에서 수동 입력)
      # 예: postgresql://user:pass@ep-xxx.ap-southeast-1.aws.neon.tech/scholarlink?sslmode=require
      - key: DATABASE_URL
        sync: false

      # 자동 생성되는 보안 값 (Render가 랜덤 생성)
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true   # 32-byte hex 자동 생성

      # 고정 설정
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: MAX_FILE_SIZE_MB
        value: "50"

      # ── 아래는 Render 대시보드에서 직접 입력해야 하는 값 ──
      # (sync: false = Blueprint가 덮어쓰지 않음, 수동 입력)
      - key: APP_URL
        sync: false           # 예: https://wheeljah.github.io/SC_link
      - key: SERVER_URL
        sync: false           # 예: https://scholarlink-api.onrender.com
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false           # Gmail 주소
      - key: SMTP_PASS
        sync: false           # Gmail 앱 비밀번호
      - key: SMTP_FROM
        sync: false           # sales@ai-traffic.kr
      - key: UNPAYWALL_EMAIL
        sync: false           # sales@ai-traffic.kr
