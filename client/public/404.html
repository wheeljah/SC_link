<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>ScholarLink</title>
    <!--
      SPA GitHub Pages redirect (https://github.com/rafgraph/spa-github-pages)
      없는 경로 → 경로를 쿼리스트링으로 인코딩하여 index.html로 리다이렉트.
      index.html의 스크립트가 원래 경로를 복원함.
      pathSegmentsToKeep = 1  →  /SC_link/ 베이스(첫 세그먼트) 유지
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
