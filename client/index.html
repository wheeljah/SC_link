<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%bv-icon.svg" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <title>ScholarLink — OA논문 검색 (OA paper search)</title>

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="ScholarLink" />
    <meta property="og:title"       content="OA논문 검색 (OA paper search)" />
    <meta property="og:description" content="DOI · PubMed ID · arXiv ID · 저널 URL을 입력하면 오픈액세스 논문을 바로 검색합니다." />
    <meta property="og:url"         content="https://wheeljah.github.io/SC_link" />
    <meta property="og:image"       content="https://wheeljah.github.io/SC_link/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale"      content="ko_KR" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="OA논문 검색 (OA paper search)" />
    <meta name="twitter:description" content="DOI · PubMed ID · arXiv ID · 저널 URL을 입력하면 오픈액세스 논문을 바로 검색합니다." />
    <meta name="twitter:image"       content="https://wheeljah.github.io/SC_link/og-image.png" />

    <!-- SPA GitHub Pages: 404.html이 인코딩한 경로를 복원 -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
